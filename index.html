<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f13" />
  <title>IPTV Hub — Free Live TV Channels</title>
  <meta name="description" content="Free IPTV aggregator. Browse thousands of verified live TV channels from 178 countries. Stream directly in your browser." />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
  <script src="app.js" type="module" defer></script>
</head>
<body>

<!-- STICKY HEADER -->
<header id="header">
  <button id="menu-toggle" aria-label="Open filters" aria-expanded="false" aria-controls="sidebar">
    ☰
  </button>

  <a href="#" id="logo" aria-label="IPTV Hub home">
    <div id="logo-icon" aria-hidden="true">📺</div>
    <span id="logo-text">IPTV<span>Hub</span></span>
  </a>

  <div id="search-wrap">
    <span id="search-icon" aria-hidden="true">🔍</span>
    <input
      type="search"
      id="search"
      placeholder="Search channels..."
      autocomplete="off"
      spellcheck="false"
      aria-label="Search channels"
    />
  </div>

  <!-- Desktop stats (hidden on mobile) -->
  <div id="header-stats" aria-live="polite">
    <div class="stat-pill">
      <span aria-hidden="true">📡</span>
      <span><strong id="stat-showing">0</strong> channels</span>
    </div>
    <div class="stat-pill">
      <span aria-hidden="true">🌍</span>
      <span><strong id="stat-countries">0</strong> countries</span>
    </div>
  </div>
</header>

<!-- NAV TABS -->
<nav id="nav-tabs" role="tablist" aria-label="Content sections">
  <button class="nav-tab active" data-section="live" role="tab" aria-selected="true">
    📺 Live TV
  </button>
  <button class="nav-tab" data-section="sports" role="tab" aria-selected="false">
    🏆 Sports
  </button>
  <button class="nav-tab" data-section="movies" role="tab" aria-selected="false">
    🎬 Movies &amp; VOD
  </button>
  <button class="nav-tab" data-section="adult" role="tab" aria-selected="false">
    🔞 Adult
  </button>
</nav>

<!-- SIDEBAR OVERLAY (mobile tap-to-close) -->
<div id="sidebar-overlay" role="presentation" aria-hidden="true"></div>

<!-- APP WRAPPER -->
<div id="app">

  <!-- SIDEBAR DRAWER -->
  <nav id="sidebar" aria-label="Filters" aria-hidden="true">

    <!-- Sidebar header with close button -->
    <div id="sidebar-header">
      <span id="sidebar-title">Filters</span>
      <button id="sidebar-close" aria-label="Close filters">✕</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Browse</div>
      <button class="filter-btn active" data-type="all" data-value="" aria-pressed="true">
        <span class="flag" aria-hidden="true">🌐</span>
        <span class="label">All Channels</span>
        <span class="count" id="count-all">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>
      <div id="categories-list" role="list">
        <div style="padding:10px 16px;color:var(--text3);font-size:13px;">Loading...</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Countries</div>
      <input
        type="search"
        id="sidebar-search"
        placeholder="Filter countries..."
        autocomplete="off"
        aria-label="Filter countries"
      />
      <div id="countries-list" role="list">
        <div style="padding:10px 16px;color:var(--text3);font-size:13px;">Loading...</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Languages</div>
      <div id="languages-list" role="list">
        <div style="padding:10px 16px;color:var(--text3);font-size:13px;">Loading...</div>
      </div>
    </div>

  </nav>

  <!-- MAIN CONTENT -->
  <main id="main">

    <!-- Mobile stats bar -->
    <div id="mobile-stats" aria-live="polite">
      <div class="m-stat">
        <span aria-hidden="true">📡</span>
        <strong id="m-stat-showing">0</strong> channels
      </div>
      <div class="m-stat">
        <span aria-hidden="true">🌍</span>
        <strong id="m-stat-countries">0</strong> countries
      </div>
    </div>

    <div id="view-title">
      All Channels
      <span id="view-subtitle"></span>
    </div>

    <div id="channels-grid" role="list" aria-live="polite" aria-label="Channels">
      <div id="loading" role="status">
        <div class="loader" aria-hidden="true"></div>
        <p>Loading channels...</p>
      </div>
    </div>

  </main>
</div>

<!-- HLS PLAYER MODAL -->
<div
  id="player-modal"
  role="dialog"
  aria-modal="true"
  aria-label="Channel Player"
  aria-hidden="true"
>
  <div id="player-container">
    <div id="player-header">
      <img id="player-logo" src="" alt="" onerror="this.style.display='none'" />
      <div id="player-info">
        <div id="player-name">Channel Name</div>
        <div id="player-meta"></div>
      </div>
      <button id="player-close" aria-label="Close player">✕</button>
    </div>

    <div id="video-wrap">
      <video id="video" controls playsinline preload="none"></video>
      <div id="player-status" role="status">
        <div class="loader" aria-hidden="true"></div>
        <p>Loading stream...</p>
      </div>
    </div>

    <div id="player-url">
      <input type="text" id="stream-url" readonly aria-label="Stream URL" />
      <button class="copy-btn" id="copy-url" aria-label="Copy stream URL">📋 Copy</button>
      <button class="copy-btn" id="open-vlc" aria-label="Open in VLC">📺 VLC</button>
    </div>
  </div>
</div>

<!-- AGE GATE MODAL -->
<div
  id="age-gate-modal"
  role="dialog"
  aria-modal="true"
  aria-label="Age Verification"
  aria-hidden="true"
>
  <div id="age-gate-container">
    <div id="age-gate-icon">🔞</div>
    <h2 id="age-gate-title">Adult Content</h2>
    <p id="age-gate-desc">This section contains adult content.<br>Are you 18 or older?</p>
    <div id="age-gate-buttons">
      <button id="age-gate-yes" class="age-btn age-btn-yes">Yes, I'm 18+</button>
      <button id="age-gate-no" class="age-btn age-btn-no">No, Go Back</button>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" role="status" aria-live="polite"></div>

</body>
</html>
