name: Update IPTV Data & Deploy

on:
  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Increased timeout: geo-block probing 10K+ streams + GitHub discovery takes time
    timeout-minutes: 180

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch, Probe & Build IPTV Data
        # If build fails partially (e.g. one source 404s), the script handles it
        # and still writes output. Only a hard crash exits non-zero.
        run: node build.js
        # To skip stream probing (faster but includes dead streams):
        # run: SKIP_PROBE=1 node build.js
        env:
          # Increase Node's default fetch timeout tolerance
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Commit updated data
        # continue-on-error so a git "nothing to commit" doesn't fail the deploy step
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update IPTV data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
